<body>
    <h1>Simon Says Game</h1>
    <h2 class="heading">Press Any key to start game</h2>
    <div class="blocks">
        <div class="l1">
            <div class="chld red" id="red" type="button" colour="red"></div>
            <div class="chld green" id="green" type="button" colour="green"></div>
        </div>    
        <div class="l2">
            <div class="chld yellow" id="yellow" type="button" colour="yellow"></div>
            <div class="chld blue" id="blue" type="button" colour="blue"></div>
        </div>  
    </div> 
    <script src="./gamelogic.js"></script>
</body>
</html>
